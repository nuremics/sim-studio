[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.9,<3.15"
marimo = ">=0.14.17,<0.19.8"
pandas = ">=2.1.1,<4"
platformdirs = ">=3.5,<5"
pyyaml = ">=5.4.1,<7"
rclone = ">=1.72.1,<2"
ruff = ">=0.12.7,<0.16"

[pypi-dependencies]
sim-studio = { path = ".", editable = true }
sim-labs = { path = "../sim-labs", editable = true }

[tasks]
ruff-check = "ruff check"
ruff-fix = "ruff check --fix"

[feature.DEMO_APP.dependencies]
matplotlib = ">=3.9.4,<4"
pygame = ">=2.6.1,<3"
pymunk = ">=7.0.1,<8"
xlsxwriter = ">=3.2.3,<4"
openpyxl = ">=3.1.5,<4"

[feature.DEMO_APP.tasks]
DEMO_APP = "NUREMICS_APP=DEMO_APP marimo run src/nuremics_studio/nuRemics_App.py"
DEMO_APP-edit = "NUREMICS_APP=DEMO_APP marimo edit src/nuremics_studio/nuRemics_App.py"

[feature.CANTILEVER_SHEAR_APP.dependencies]
pythonocc-core = ">=7.4.0,<8"
vtk = "=9.6.0"

[feature.CANTILEVER_SHEAR_APP.pypi-dependencies]
gmsh = ">=4.15.0,<5"
meshio = ">=5.3.5,<6"
pyvista = { version = "==0.47.1", extras = ["jupyter"] }
trame-vtk = "<2.10.3"

[feature.CANTILEVER_SHEAR_APP.tasks]
CANTILEVER_SHEAR_APP = "NUREMICS_APP=CANTILEVER_SHEAR_APP marimo run src/nuremics_studio/nuRemics_App.py"
CANTILEVER_SHEAR_APP-edit = "NUREMICS_APP=CANTILEVER_SHEAR_APP marimo edit src/nuremics_studio/nuRemics_App.py"
run-test = "python test.py"

[environments]
demo = ["DEMO_APP"]
cantilever-shear = ["CANTILEVER_SHEAR_APP"]
